  <!-- ── Preloader (inline CSS = zero flash before fonts) ── -->
  <style>
    #preloader{position:fixed;inset:0;z-index:99999;background:#f7faf5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;transition:opacity .75s cubic-bezier(.4,0,.2,1),visibility .75s}
    #preloader.out{opacity:0;visibility:hidden;pointer-events:none}
    .pl-ring{animation:pl-spin 20s linear infinite;transform-origin:41px 41px}
    .pl-branch{stroke-dasharray:620;stroke-dashoffset:620;animation:pl-draw 2s .1s cubic-bezier(.4,0,.2,1) forwards}
    .pl-leaf1{stroke-dasharray:190;stroke-dashoffset:190;animation:pl-draw 1.3s .65s ease forwards}
    .pl-leaf2{stroke-dasharray:190;stroke-dashoffset:190;animation:pl-draw 1.3s .95s ease forwards}
    .pl-leaf3{stroke-dasharray:165;stroke-dashoffset:165;animation:pl-draw 1.1s 1.2s ease forwards}
    @keyframes pl-draw{to{stroke-dashoffset:0}}
    @keyframes pl-spin{to{transform:rotate(360deg)}}
    .pl-brand{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:300;letter-spacing:.42em;color:#3a6b33;text-transform:uppercase;opacity:0;animation:pl-rise .7s .55s ease forwards;padding-left:.42em}
    .pl-sub{font-family:'Jost',Helvetica,sans-serif;font-size:9.5px;letter-spacing:.38em;text-transform:uppercase;color:#6b8f61;opacity:0;animation:pl-rise .6s .85s ease forwards;padding-left:.38em}
    @keyframes pl-rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .pl-track{width:88px;height:1px;background:rgba(74,140,63,.15);overflow:hidden;border-radius:1px;opacity:0;animation:pl-rise .4s 1.05s ease forwards}
    .pl-bar{height:100%;background:linear-gradient(90deg,#4a8c3f,#8fad85);width:0;animation:pl-load 2s .25s cubic-bezier(.4,0,.2,1) forwards}
    @keyframes pl-load{0%{width:0}55%{width:65%}100%{width:100%}}
  </style>
