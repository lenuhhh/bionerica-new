<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Офлайн режим</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdf8;
      --text: #2a241b;
      --muted: #746b5d;
      --accent: #c9a96e;
      --border: rgba(42, 36, 27, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #fff7e6 0%, var(--bg) 48%, #efe8db 100%);
      color: var(--text);
      font-family: "Plus Jakarta Sans", "DM Sans", sans-serif;
      padding: 24px;
    }
    .card {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px;
      box-shadow: 0 18px 40px rgba(42, 36, 27, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 700;
    }
    p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    a {
      text-decoration: none;
      display: inline-block;
      padding: 10px 14px;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #171309;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Немає мережі</h1>
    <p>Ви зараз в офлайн-режимі. Каталог і частина контенту відкриються з кешу, а дії в акаунті будуть відправлені після відновлення інтернету.</p>
    <p>Можна повернутися на головну або відкрити сторінки, які були відвідані раніше.</p>
    <div class="actions">
      <a href="/" class="primary">На головну</a>
      <a href="/catalog">Каталог</a>
      <a href="/account">Кабінет</a>
      <a href="/account/chat">Чат</a>
    </div>
  </div>
</body>
</html>
